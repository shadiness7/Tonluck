<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>TONLUCK — демо</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* =========================================================================
   TONLUCK — НЕнастоящее демо-казино на TON и подарки Telegram.
   Баланс нельзя пополнить/вывести — он просто задаётся вручную.
   Смысл: показать, что вдолгую казино всегда в плюсе (см. вкладку «Профиль»).
   ========================================================================= */
:root{
  --bg:#0F1422;
  --bg2:#161E30;
  --surface:#1C2438;
  --surface2:#232E45;
  --surface3:#2E3A56;
  --line:rgba(255,255,255,.10);
  --line2:rgba(255,255,255,.17);
  --text:#F4F7FC;
  --muted:#9AA6BE;
  --muted2:#6C7791;
  --ton:#0098EA;
  --ton-lite:#2AABEE;
  --ton-deep:#0077C2;
  --green:#2ED573;
  --green-deep:#16A35A;
  --red:#FF4365;
  --gold:#FFB020;
  --radius:18px;
  --radius-sm:13px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
.num{font-family:'Space Grotesk','Inter',sans-serif;font-feature-settings:"tnum" 1;letter-spacing:-.01em;}

/* ---- phone frame on desktop ---- */
.app{
  position:relative;
  width:100%;
  max-width:440px;
  margin:0 auto;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  background:
    radial-gradient(120% 60% at 50% -10%, rgba(0,152,234,.16), transparent 60%),
    linear-gradient(180deg,var(--bg2),var(--bg) 40%);
  overflow:hidden;
}
@media(min-width:480px){
  body{background:#0A0E18;display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:18px 0;}
  .app{min-height:880px;height:92dvh;border-radius:34px;border:1px solid var(--line2);box-shadow:0 40px 120px -30px rgba(0,0,0,.85),0 0 0 8px #11161f;}
}

/* ---- top bar ---- */
.topbar{
  flex:0 0 auto;
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 16px 12px;
  gap:10px;
}
.brand{display:flex;align-items:center;gap:9px;}
.brand .logo{filter:drop-shadow(0 4px 10px rgba(0,152,234,.5));}
.brand .name{font-family:'Space Grotesk';font-weight:700;font-size:18px;letter-spacing:.5px;}
.brand .name b{color:var(--ton-lite);}
.brand .tag{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--muted2);border:1px solid var(--line2);padding:2px 5px;border-radius:6px;margin-left:2px;}

.balance-pill{
  display:flex;align-items:center;gap:8px;
  background:linear-gradient(180deg,#26344f,#1b2640);
  border:1px solid rgba(42,171,238,.45);
  padding:8px 11px 8px 9px;border-radius:999px;cursor:pointer;
  box-shadow:0 4px 16px -6px rgba(0,152,234,.5), inset 0 1px 0 rgba(255,255,255,.06);
  transition:transform .12s, border-color .2s;
}
.balance-pill:active{transform:scale(.96);}
.balance-pill .bal-val{font-size:16px;font-weight:700;color:#FFFFFF;text-shadow:0 1px 2px rgba(0,0,0,.4);}
.balance-pill .chev{color:var(--ton-lite);opacity:.85;transition:transform .2s;}

/* ---- screens ---- */
.screen{flex:1 1 auto;overflow-y:auto;overflow-x:hidden;padding:4px 14px 96px;-webkit-overflow-scrolling:touch;}
.screen::-webkit-scrollbar{width:0;}
.hidden{display:none !important;}

/* ---- section title ---- */
.eyebrow{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted2);margin:18px 2px 10px;}

/* ---- game select ---- */
.hero{
  margin:6px 0 4px;padding:18px;border-radius:var(--radius);
  background:
    radial-gradient(80% 120% at 85% 0%, rgba(0,152,234,.22), transparent 60%),
    linear-gradient(150deg,var(--surface2),var(--surface));
  border:1px solid var(--line2);position:relative;overflow:hidden;
}
.hero h1{margin:0;font-family:'Space Grotesk';font-size:23px;line-height:1.15;font-weight:700;letter-spacing:-.5px;}
.hero p{margin:8px 0 0;color:var(--muted);font-size:13px;line-height:1.5;max-width:88%;}
.hero .spark{position:absolute;right:-20px;bottom:-30px;opacity:.18;transform:rotate(-12deg);}

.game-card{
  display:flex;align-items:center;gap:14px;
  padding:16px;margin-top:12px;border-radius:var(--radius);
  background:linear-gradient(180deg,var(--surface2),var(--surface));
  border:1px solid var(--line);cursor:pointer;
  transition:transform .14s,border-color .2s,background .2s;
}
.game-card:active{transform:scale(.98);}
.game-card:hover{border-color:var(--line2);}
.game-ico{
  width:58px;height:58px;flex:0 0 auto;border-radius:15px;
  display:grid;place-items:center;font-size:28px;
  border:1px solid var(--line2);
}
.game-ico.mines{background:radial-gradient(120% 120% at 30% 20%,#2a3550,#101a2e 70%),linear-gradient(150deg,#1b2540,#0e1626);}
.game-ico.tower{background:linear-gradient(150deg,#10324f,#0a1828);}
.game-card .gc-body{flex:1;min-width:0;}
.game-card .gc-name{font-family:'Space Grotesk';font-weight:700;font-size:17px;}
.game-card .gc-desc{color:var(--muted);font-size:12.5px;margin-top:3px;line-height:1.4;}
.game-card .gc-go{
  flex:0 0 auto;width:34px;height:34px;border-radius:50%;
  display:grid;place-items:center;background:var(--surface3);border:1px solid var(--line2);color:var(--ton-lite);
}

/* ---- in-game shell ---- */
.game-head{display:flex;align-items:center;gap:12px;padding:10px 2px 14px;}
.back-btn{
  width:38px;height:38px;border-radius:12px;border:1px solid var(--line2);
  background:var(--surface);display:grid;place-items:center;cursor:pointer;color:var(--text);
  transition:transform .12s;
}
.back-btn:active{transform:scale(.92);}
.game-head .gh-title{font-family:'Space Grotesk';font-weight:700;font-size:19px;}
.game-head .gh-sub{font-size:12px;color:var(--muted);}

.panel{background:linear-gradient(180deg,var(--surface),var(--surface2) 140%);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:14px;}

/* ---- bet controls ---- */
.field-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.4px;margin-bottom:7px;display:flex;justify-content:space-between;}
.bet-input-wrap{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--line2);border-radius:13px;padding:11px 12px;}
.bet-input-wrap input{
  flex:1;background:none;border:none;outline:none;color:var(--text);
  font-family:'Space Grotesk';font-size:19px;font-weight:600;width:100%;min-width:0;
}
.bet-mini-btns{display:flex;gap:6px;}
.mini-btn{
  background:var(--surface3);border:1px solid var(--line2);color:var(--muted);
  font-size:11px;font-weight:700;padding:6px 9px;border-radius:8px;cursor:pointer;font-family:'Space Grotesk';
}
.mini-btn:active{transform:scale(.94);}
.chips{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap;}
.chip{
  flex:1;min-width:54px;text-align:center;background:var(--bg2);border:1px solid var(--line2);
  color:var(--text);font-family:'Space Grotesk';font-weight:600;font-size:13px;padding:9px 4px;border-radius:10px;cursor:pointer;
}
.chip:active{transform:scale(.95);}

.mines-count{display:flex;gap:7px;align-items:center;margin-top:4px;}
.mines-count .mc-btn{width:40px;height:40px;border-radius:11px;border:1px solid var(--line2);background:var(--bg2);color:var(--text);font-size:20px;font-weight:600;cursor:pointer;display:grid;place-items:center;}
.mines-count .mc-btn:active{transform:scale(.9);}
.mines-count .mc-val{flex:1;text-align:center;}
.mines-count .mc-val .v{font-family:'Space Grotesk';font-size:22px;font-weight:700;line-height:1;}
.mines-count .mc-val .l{font-size:10px;color:var(--muted);letter-spacing:.5px;}

.diff-row{display:flex;gap:7px;margin-top:2px;}
.diff-btn{flex:1;text-align:center;background:var(--bg2);border:1px solid var(--line2);color:var(--muted);padding:9px 2px;border-radius:11px;cursor:pointer;font-size:12px;font-weight:600;transition:.15s;}
.diff-btn.active{background:linear-gradient(180deg,var(--ton),var(--ton-deep));color:#fff;border-color:transparent;box-shadow:0 6px 16px -6px rgba(0,152,234,.7);}
.diff-btn .db-sub{display:block;font-size:9.5px;opacity:.7;margin-top:2px;}

/* ---- live multiplier bar ---- */
.live-bar{display:flex;gap:10px;margin-bottom:14px;}
.live-cell{flex:1;background:var(--bg2);border:1px solid var(--line2);border-radius:13px;padding:11px 13px;}
.live-cell .lc-l{font-size:10px;letter-spacing:.6px;color:var(--muted);text-transform:uppercase;}
.live-cell .lc-v{font-family:'Space Grotesk';font-size:21px;font-weight:700;margin-top:3px;display:flex;align-items:center;gap:5px;}
.live-cell.mult .lc-v{color:var(--ton-lite);}

/* ---- mines board ---- */
.board{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin-bottom:14px;}
.tile{
  aspect-ratio:1;border-radius:13px;cursor:pointer;position:relative;
  background:linear-gradient(160deg,var(--surface3),var(--surface));
  border:1px solid var(--line2);
  display:grid;place-items:center;font-size:24px;
  transition:transform .12s, background .2s, border-color .2s;
  user-select:none;
}
.tile::before{content:"";position:absolute;inset:0;border-radius:inherit;background:radial-gradient(70% 60% at 30% 25%,rgba(255,255,255,.10),transparent 60%);pointer-events:none;}
.tile:not(.revealed):active{transform:scale(.93);}
.tile.disabled{pointer-events:none;}
.tile.reveal-anim{animation:pop .28s cubic-bezier(.2,1.4,.5,1);}
.tile.gem{background:linear-gradient(160deg,#10402f,#0c2a22);border-color:rgba(46,213,115,.5);}
.tile.gem.cashed{box-shadow:0 0 0 1px rgba(46,213,115,.6),0 0 18px -4px rgba(46,213,115,.7);}
.tile.mine{background:linear-gradient(160deg,#4a1422,#2a0b13);border-color:rgba(255,67,101,.6);}
.tile.mine.hit{animation:shake .4s;box-shadow:0 0 22px -2px rgba(255,67,101,.8);}
.tile.faded{opacity:.4;}

/* ---- tower ---- */
.tower{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.trow{display:flex;gap:8px;align-items:center;padding:4px 2px;border-radius:13px;transition:.2s;position:relative;}
.trow.active{background:linear-gradient(90deg,rgba(0,152,234,.12),transparent);}
.trow.locked{opacity:.45;}
.trow .tmult{width:52px;flex:0 0 auto;text-align:right;font-family:'Space Grotesk';font-size:12.5px;font-weight:600;color:var(--muted);padding-right:2px;}
.trow.active .tmult{color:var(--ton-lite);}
.tcells{flex:1;display:flex;gap:8px;}
.tcell{
  flex:1;height:42px;border-radius:11px;cursor:pointer;
  background:linear-gradient(160deg,var(--surface3),var(--surface));
  border:1px solid var(--line2);display:grid;place-items:center;font-size:19px;
  transition:transform .12s,background .2s,border-color .2s;
}
.trow:not(.active) .tcell{pointer-events:none;}
.tcell:active{transform:scale(.93);}
.tcell.gem{background:linear-gradient(160deg,#10402f,#0c2a22);border-color:rgba(46,213,115,.55);}
.tcell.mine{background:linear-gradient(160deg,#4a1422,#2a0b13);border-color:rgba(255,67,101,.6);}
.tcell.pop{animation:pop .26s cubic-bezier(.2,1.4,.5,1);}
.tcell.faded{opacity:.5;}
.tcell.mine.hit{animation:shake .42s;box-shadow:0 0 22px 0 rgba(255,67,101,.85);border-color:#ff4365;z-index:2;}

/* ---- big action button ---- */
.btn{
  width:100%;border:none;border-radius:15px;padding:16px;cursor:pointer;
  font-family:'Space Grotesk';font-weight:700;font-size:16px;letter-spacing:.2px;color:#fff;
  transition:transform .12s,filter .2s,opacity .2s;
}
.btn:active{transform:scale(.985);}
.btn[disabled]{opacity:.4;pointer-events:none;}
.btn-primary{background:linear-gradient(180deg,var(--ton-lite),var(--ton-deep));box-shadow:0 12px 28px -10px rgba(0,152,234,.8);}
.btn-cashout{background:linear-gradient(180deg,#34e07f,#15a157);box-shadow:0 12px 28px -10px rgba(46,213,115,.7);display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-danger{background:linear-gradient(180deg,#ff5a78,#d62244);}
.btn-ghost{background:var(--surface2);border:1px solid var(--line2);}
.btn-row{display:flex;gap:10px;}
.btn-row .btn{flex:1;}

/* ---- inventory ---- */
.gift-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-top:6px;}
.gift-card{
  border-radius:var(--radius-sm);padding:12px 8px 10px;text-align:center;cursor:pointer;
  border:1px solid var(--line2);position:relative;overflow:hidden;
  transition:transform .14s;
}
.gift-card:active{transform:scale(.95);}
.gift-emoji{display:flex;align-items:center;justify-content:center;line-height:1;filter:drop-shadow(0 4px 8px rgba(0,0,0,.45));min-height:54px;}
.gift-name{font-size:11px;font-weight:600;margin-top:8px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gift-price{font-family:'Space Grotesk';font-size:11.5px;font-weight:600;margin-top:3px;color:rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;gap:3px;}
.gift-badge{position:absolute;top:6px;right:6px;font-size:8px;font-weight:700;letter-spacing:.3px;padding:2px 5px;border-radius:6px;background:rgba(0,0,0,.35);text-transform:uppercase;}
.empty{
  text-align:center;padding:54px 24px;color:var(--muted);
}
.empty .e-ico{font-size:46px;opacity:.5;}
.empty .e-t{font-weight:600;color:var(--text);margin-top:14px;font-size:16px;}
.empty .e-s{font-size:13px;margin-top:6px;line-height:1.5;}
.inv-summary{display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,var(--surface2),var(--surface));border:1px solid var(--line2);border-radius:var(--radius);padding:14px 16px;margin-top:6px;}
.inv-summary .is-l{font-size:12px;color:var(--muted);}
.inv-summary .is-v{font-family:'Space Grotesk';font-size:22px;font-weight:700;margin-top:2px;display:flex;align-items:center;gap:6px;}

/* ---- profile ---- */
.profile-head{display:flex;align-items:center;gap:14px;padding:8px 2px 16px;}
.avatar{width:62px;height:62px;border-radius:50%;background:linear-gradient(150deg,var(--ton-lite),#6b2fb3);display:grid;place-items:center;font-size:30px;border:1px solid var(--line2);}
.profile-head .ph-name{font-family:'Space Grotesk';font-weight:700;font-size:20px;}
.profile-head .ph-sub{font-size:12.5px;color:var(--muted);margin-top:2px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.stat-card{background:linear-gradient(180deg,var(--surface),var(--surface2));border:1px solid var(--line);border-radius:var(--radius-sm);padding:14px;}
.stat-card.wide{grid-column:1 / -1;}
.stat-card .sc-l{font-size:11px;color:var(--muted);letter-spacing:.4px;}
.stat-card .sc-v{font-family:'Space Grotesk';font-size:24px;font-weight:700;margin-top:6px;display:flex;align-items:center;gap:5px;}
.stat-card .sc-v.pos{color:var(--green);}
.stat-card .sc-v.neg{color:var(--red);}
.house-card{
  margin-top:14px;border-radius:var(--radius);padding:18px;
  background:radial-gradient(90% 120% at 90% 0%,rgba(255,67,101,.16),transparent 55%),linear-gradient(160deg,var(--surface2),var(--surface));
  border:1px solid var(--line2);
}
.house-card .hc-l{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted2);}
.house-card .hc-v{font-family:'Space Grotesk';font-size:34px;font-weight:700;margin:8px 0 4px;display:flex;align-items:center;gap:7px;}
.house-card .hc-note{font-size:12.5px;color:var(--muted);line-height:1.55;margin-top:8px;}
.rtp-bar{height:9px;border-radius:6px;background:var(--bg2);border:1px solid var(--line2);overflow:hidden;margin-top:12px;}
.rtp-fill{height:100%;background:linear-gradient(90deg,var(--green),#16a35a);border-radius:6px;transition:width .6s;}
.rtp-legend{display:flex;justify-content:space-between;font-size:10.5px;color:var(--muted2);margin-top:6px;}

.info-card{margin-top:14px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;font-size:13px;color:var(--muted);line-height:1.6;}
.info-card b{color:var(--text);}

/* ---- tab bar ---- */
.tabbar{
  flex:0 0 auto;position:sticky;bottom:0;
  display:flex;justify-content:space-around;align-items:center;
  padding:9px 8px calc(9px + env(safe-area-inset-bottom));
  background:linear-gradient(180deg,rgba(11,15,28,.4),var(--bg2) 60%);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-top:1px solid var(--line);
}
.tab{
  flex:1;background:none;border:none;cursor:pointer;color:var(--muted2);
  display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px;
  font-size:10.5px;font-weight:600;transition:color .2s;
}
.tab svg{transition:transform .2s;}
.tab.active{color:var(--ton-lite);}
.tab.active svg{transform:translateY(-1px);}
.tab .badge{position:absolute;}

/* ---- sheets / overlay ---- */
.overlay{
  position:absolute;inset:0;z-index:50;
  background:rgba(2,4,9,.62);backdrop-filter:blur(3px);
  display:flex;align-items:flex-end;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.overlay.open{opacity:1;pointer-events:auto;}
.sheet{
  width:100%;background:linear-gradient(180deg,var(--surface2),var(--surface));
  border-top:1px solid var(--line2);border-radius:26px 26px 0 0;
  padding:10px 18px calc(22px + env(safe-area-inset-bottom));
  transform:translateY(100%);transition:transform .32s cubic-bezier(.2,.9,.3,1);
  max-height:90%;overflow-y:auto;
}
.overlay.open .sheet{transform:translateY(0);}
.sheet-handle{width:38px;height:4px;border-radius:3px;background:var(--line2);margin:4px auto 16px;}
.sheet h3{margin:0 0 4px;font-family:'Space Grotesk';font-size:19px;font-weight:700;}
.sheet .sub{font-size:12.5px;color:var(--muted);line-height:1.5;margin-bottom:16px;}
.demo-tag{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;letter-spacing:.6px;color:var(--gold);background:rgba(255,176,32,.12);border:1px solid rgba(255,176,32,.3);padding:4px 9px;border-radius:7px;margin-bottom:14px;text-transform:uppercase;}

/* win sheet */
.win-art{text-align:center;padding:8px 0 6px;}
.win-emoji{font-size:74px;line-height:1;display:inline-block;animation:winpop .5s cubic-bezier(.2,1.5,.4,1);filter:drop-shadow(0 10px 24px rgba(0,0,0,.5));}
.win-emoji.glow{filter:drop-shadow(0 0 26px var(--glow,rgba(46,213,115,.7)));}
.win-title{font-family:'Space Grotesk';font-weight:700;font-size:15px;color:var(--green);letter-spacing:.5px;text-transform:uppercase;margin-top:10px;}
.win-name{font-family:'Space Grotesk';font-size:26px;font-weight:700;margin-top:4px;}
.win-val{font-family:'Space Grotesk';font-size:16px;font-weight:600;color:var(--muted);margin-top:6px;display:flex;align-items:center;justify-content:center;gap:6px;}
.win-change{margin-top:8px;display:inline-flex;align-items:center;gap:5px;font-family:'Space Grotesk';font-weight:600;font-size:13px;color:var(--green);background:rgba(46,213,115,.12);border:1px solid rgba(46,213,115,.3);padding:5px 11px;border-radius:9px;}
.win-rare{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:4px 10px;border-radius:8px;margin-top:12px;}

/* gift detail */
.gd-art{text-align:center;padding:6px 0 0;}
.gd-emoji{display:flex;align-items:center;justify-content:center;line-height:1;}
.gd-name{font-family:'Space Grotesk';font-size:22px;font-weight:700;margin-top:8px;}
.gd-price{font-family:'Space Grotesk';font-size:15px;color:var(--muted);margin-top:4px;display:flex;align-items:center;justify-content:center;gap:6px;}

/* toast */
.toast{
  position:absolute;left:50%;bottom:96px;transform:translate(-50%,20px);z-index:80;
  background:var(--surface3);border:1px solid var(--line2);color:var(--text);
  padding:11px 18px;border-radius:12px;font-size:13px;font-weight:500;
  opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;white-space:nowrap;
  box-shadow:0 12px 30px -10px rgba(0,0,0,.7);
}
.toast.show{opacity:1;transform:translate(-50%,0);}

@keyframes pop{0%{transform:scale(.4);opacity:0;}100%{transform:scale(1);opacity:1;}}
@keyframes winpop{0%{transform:scale(.3) rotate(-12deg);opacity:0;}60%{transform:scale(1.15) rotate(4deg);}100%{transform:scale(1) rotate(0);opacity:1;}}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-6px);}40%{transform:translateX(6px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}
/* ---- game icon: dice ---- */
.game-ico.dice{background:linear-gradient(150deg,#2a2050,#1a1030);}

/* ---- bet mode toggle ---- */
.bet-mode-row{display:flex;gap:7px;margin-bottom:12px;background:var(--bg2);border:1px solid var(--line2);border-radius:12px;padding:4px;}
.bet-mode{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;background:none;border:none;color:var(--muted);font-family:'Space Grotesk';font-weight:600;font-size:13px;padding:9px;border-radius:9px;cursor:pointer;transition:.15s;}
.bet-mode.active{background:linear-gradient(180deg,var(--surface3),var(--surface2));color:#fff;box-shadow:0 2px 8px -3px rgba(0,0,0,.5);}
.bet-mode svg{display:inline-block;}

/* ---- stake gift selector ---- */
.stake-gift{width:100%;display:flex;align-items:center;gap:11px;background:var(--bg2);border:1px solid var(--line2);border-radius:13px;padding:10px 12px;cursor:pointer;color:var(--text);text-align:left;transition:transform .12s;}
.stake-gift:active{transform:scale(.98);}
.stake-gift.empty{justify-content:center;color:var(--muted);font-weight:600;font-size:13px;font-family:'Space Grotesk';padding:14px;}
.stake-gift .sg-info{flex:1;min-width:0;}
.stake-gift .sg-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.stake-gift .sg-price{font-family:'Space Grotesk';font-size:12px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:4px;}
.stake-gift .sg-go{font-size:12px;color:var(--ton-lite);font-weight:600;}

/* ---- dice prize picker card ---- */
.gift-card.target-auto{display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(165deg,rgba(255,255,255,.08),rgba(255,255,255,.02));border:1px dashed var(--line2);}
.gift-card.target-auto .ga-ico{font-size:30px;}
.gift-card.target-auto .gift-price{color:var(--muted2);font-size:10px;}
.gift-card.sel{outline:2px solid var(--ton-lite);outline-offset:1px;}

/* ---- prize preview chips ---- */
.prize-row{display:flex;gap:9px;margin:0 0 14px;}
.prize-chip{flex:1;min-width:0;background:linear-gradient(180deg,var(--surface),var(--surface2));border:1px solid var(--line);border-radius:12px;padding:9px 11px;}
.prize-chip .pc-l{display:block;font-size:10px;letter-spacing:.4px;color:var(--muted2);text-transform:uppercase;margin-bottom:5px;}
.prize-chip .pc-body{display:flex;align-items:center;gap:7px;}
.prize-chip .pc-body img{flex:0 0 auto;}
.prize-chip .pc-name{font-family:'Space Grotesk';font-weight:600;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prize-chip .pc-dim{color:var(--muted2);font-family:'Space Grotesk';}

/* ---- tower reveal (full board on game over) ---- */
.trow.revealed-bright{opacity:1;}
.trow.revealed-dim{opacity:.26;}
.tcell.dim-cell{opacity:.5;}
.trow.revealed-dim .tcell.dim-cell{opacity:1;}
.tcell.gem.path{box-shadow:0 0 0 1px rgba(46,213,115,.7),0 0 14px -3px rgba(46,213,115,.7);}
.prize-chip .pc-change{font-size:11px;font-weight:700;color:var(--green);font-family:'Space Grotesk';margin-left:2px;white-space:nowrap;}

/* ---- DICE game ---- */
.dice-stage{display:flex;align-items:center;gap:6px;margin:6px 0 6px;}
.dice-prize-hint{text-align:center;font-size:11px;color:var(--muted);margin:0 0 12px;line-height:1.3;}
.dice-ring-wrap{position:relative;flex:1 1 0;min-width:120px;max-width:210px;aspect-ratio:1;margin:0 auto;}
.dice-side-prize{flex:0 0 74px;width:74px;height:108px;box-sizing:border-box;border-radius:13px;padding:8px 5px;text-align:center;border:1px solid var(--line2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;overflow:hidden;cursor:pointer;transition:transform .12s,border-color .12s;}
.dice-side-prize:active{transform:scale(.95);}
.dice-side-prize.purple:active{border-color:#9B5DE5;}
.dice-side-prize.blue:active{border-color:#2AABEE;}
.dice-side-prize.blue{background:linear-gradient(180deg,rgba(42,171,238,.18),rgba(42,171,238,.03));}
.dice-side-prize.purple{background:linear-gradient(180deg,rgba(155,93,229,.20),rgba(155,93,229,.03));}
.dice-side-prize .dps-mult{font-family:'Space Grotesk';font-weight:700;font-size:16px;line-height:1.1;height:18px;}
.dice-side-prize.blue .dps-mult{color:#5cc3f5;}
.dice-side-prize.purple .dps-mult{color:#b58bef;}
.dice-side-prize .dps-img,.dice-side-prize img{width:30px;height:30px;flex:0 0 auto;margin:0 auto;border-radius:8px;object-fit:cover;}
.dice-side-prize .dps-tonline{height:30px;display:flex;align-items:center;justify-content:center;}
.dice-side-prize .dps-name{display:block;max-width:100%;font-family:'Space Grotesk';font-weight:600;font-size:10px;line-height:1.15;height:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dice-side-prize .dps-change{display:block;max-width:100%;font-size:9.5px;font-weight:700;color:var(--green);line-height:1.1;height:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dice-ring{position:absolute;inset:0;width:100%;height:100%;transform:rotate(0);}
.dice-pointer{position:absolute;inset:0;transform-origin:50% 50%;will-change:transform;}
.dice-pointer .dp-dot{position:absolute;top:6.67%;left:50%;width:18px;height:18px;margin-left:-9px;margin-top:-9px;border-radius:50%;background:#fff;border:3px solid #0F1422;box-shadow:0 0 12px rgba(255,255,255,.9),0 2px 6px rgba(0,0,0,.6);}
.dice-skull{position:absolute;inset:0;transform-origin:50% 50%;pointer-events:none;}
.dice-skull .ds-i{position:absolute;top:6.67%;left:50%;width:26px;height:26px;margin-left:-13px;margin-top:-13px;display:grid;place-items:center;font-size:18px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.7));}
.dice-center{position:absolute;inset:22%;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:radial-gradient(circle at 50% 35%, rgba(255,255,255,.05), transparent 70%);}
.dice-center .dc-hint{font-size:11px;color:var(--muted);line-height:1.35;font-weight:500;}
.dice-center .dc-roll{font-family:'Space Grotesk';font-size:34px;color:var(--ton-lite);animation:spin 1s linear infinite;}
.dice-center .dc-res{font-family:'Space Grotesk';font-weight:700;font-size:26px;line-height:1;}
.dice-center .dc-res.win{color:var(--green);}
.dice-center .dc-res.lose{color:var(--red);}
.dice-center .dc-sub{font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:.5px;text-transform:uppercase;}
.dice-center .dc-win{display:flex;flex-direction:column;align-items:center;gap:5px;}
.dice-center .dc-wname{font-family:'Space Grotesk';font-weight:600;font-size:10.5px;max-width:74px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--green);}
@keyframes spin{to{transform:rotate(360deg);}}

.dice-slider-wrap{margin:0 2px 14px;}
.ds-ends{display:flex;justify-content:space-between;font-family:'Space Grotesk';font-weight:600;font-size:12px;margin-bottom:7px;}
.ds-ends .ds-blue{color:var(--ton-lite);}
.ds-ends .ds-purple{color:#b58bef;}
input.dice-slider{-webkit-appearance:none;appearance:none;width:100%;height:8px;border-radius:6px;background:linear-gradient(90deg,#9B5DE5 0 50%,#2AABEE 50% 100%);outline:none;border:1px solid var(--line2);}
input.dice-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:24px;height:24px;border-radius:50%;background:#fff;border:4px solid #1b2640;box-shadow:0 2px 8px rgba(0,0,0,.6);cursor:pointer;}
input.dice-slider::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:#fff;border:4px solid #1b2640;box-shadow:0 2px 8px rgba(0,0,0,.6);cursor:pointer;}
input.dice-slider:disabled{opacity:.6;}

.dice-bet-row{display:flex;gap:10px;margin-bottom:12px;}
.dice-bet{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:13px;border-radius:14px;}
.dice-bet.blue{background:linear-gradient(180deg,#2AABEE,#1372b8);box-shadow:0 10px 24px -10px rgba(42,171,238,.7);}
.dice-bet.purple{background:linear-gradient(180deg,#9B5DE5,#6a2fb0);box-shadow:0 10px 24px -10px rgba(155,93,229,.7);}
.dice-bet .db-mult{font-size:18px;font-weight:700;}
.dice-bet .db-cap{font-size:11px;letter-spacing:1.5px;opacity:.9;}

.dice-auto{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;padding:4px 2px;}
.dice-auto input{display:none;}
.dice-auto .da-track{width:42px;height:24px;border-radius:14px;background:var(--surface3);border:1px solid var(--line2);position:relative;transition:.2s;flex:0 0 auto;}
.dice-auto .da-knob{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s;}
.dice-auto input:checked + .da-track{background:linear-gradient(180deg,var(--ton-lite),var(--ton-deep));}
.dice-auto input:checked + .da-track .da-knob{left:20px;}
.dice-auto .da-l{font-size:13px;font-weight:600;color:var(--text);}

/* ---- game menu tiles (2 per row, themed art) ---- */
.game-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:6px;}
.game-tile{position:relative;border-radius:var(--radius);overflow:hidden;cursor:pointer;border:1px solid var(--line2);aspect-ratio:1/0.9;transition:transform .14s;}
.game-tile:active{transform:scale(.97);}
.gt-art{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.gt-art svg{width:84%;height:84%;}
.art-mines{background:radial-gradient(120% 100% at 72% 8%,rgba(255,67,101,.20),transparent 60%),linear-gradient(160deg,#1d2747,#0e1626);}
.art-tower{background:radial-gradient(120% 100% at 28% 8%,rgba(46,213,115,.18),transparent 60%),linear-gradient(160deg,#103150,#0a1828);}
.art-dice{background:radial-gradient(120% 100% at 50% 8%,rgba(155,93,229,.24),transparent 62%),linear-gradient(160deg,#201747,#0e0a22);}
.art-hilo{background:radial-gradient(120% 100% at 62% 8%,rgba(255,176,32,.18),transparent 60%),linear-gradient(160deg,#16334c,#0c1a28);}
.gt-scrim{position:absolute;left:0;right:0;bottom:0;height:52%;background:linear-gradient(to top,rgba(8,11,20,.95),rgba(8,11,20,.45) 55%,transparent);pointer-events:none;}
.gt-name{position:absolute;left:13px;bottom:11px;font-family:'Space Grotesk';font-weight:700;font-size:20px;letter-spacing:.4px;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.7);}

.cell-ton{display:grid;place-items:center;}

/* ---- Hi-Lo ---- */
.hilo-stage{display:flex;align-items:center;justify-content:center;gap:14px;margin:6px 0 14px;}
.hilo-stage.two{gap:12px;}
.playcard{width:88px;height:120px;border-radius:13px;background:linear-gradient(160deg,#fbfbfe,#e4e7f1);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#15182a;box-shadow:0 12px 28px -10px rgba(0,0,0,.75);border:1px solid rgba(0,0,0,.16);}
.playcard.red{color:#e23350;}
.playcard.back{background:linear-gradient(160deg,#27354f,#172033);color:rgba(255,255,255,.45);font-family:'Space Grotesk';font-size:46px;font-weight:700;}
.playcard .pc-rank{font-family:'Space Grotesk';font-weight:700;font-size:40px;line-height:1;}
.playcard .pc-suit{font-size:32px;line-height:1;margin-top:2px;}
.hilo-arrow{font-size:24px;font-weight:700;}
.hilo-arrow.up{color:var(--green);}
.hilo-arrow.down{color:var(--red);}
.hilo-guess-row{display:flex;gap:10px;margin-bottom:10px;}
.hilo-guess{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:12px 8px;border-radius:14px;color:#fff;}
.hilo-guess.hi{background:linear-gradient(180deg,#34e07f,#16a35a);box-shadow:0 10px 24px -10px rgba(46,213,115,.6);}
.hilo-guess.lo{background:linear-gradient(180deg,#ff5a78,#d62244);box-shadow:0 10px 24px -10px rgba(255,67,101,.6);}
.hilo-guess .hg-top{font-size:12px;font-weight:700;}
.hilo-guess .hg-mult{font-size:17px;font-weight:700;font-family:'Space Grotesk';}
.hilo-guess .hg-prize{display:flex;align-items:center;gap:5px;font-family:'Space Grotesk';font-weight:600;font-size:11px;background:rgba(0,0,0,.20);padding:3px 8px;border-radius:8px;}
.hilo-guess .hgp-ch{font-weight:700;}

/* ---- Hi-Lo history track ---- */
.hilo-track{display:flex;align-items:flex-end;gap:7px;margin:6px 0 14px;overflow-x:auto;padding:11px 4px 6px;-webkit-overflow-scrolling:touch;}
.hilo-track::-webkit-scrollbar{height:0;}
.playcard.small{flex:0 0 auto;width:46px;height:64px;border-radius:9px;box-shadow:0 6px 14px -6px rgba(0,0,0,.6);position:relative;opacity:.95;}
.playcard.small .pc-rank{font-size:20px;}
.playcard.small .pc-suit{font-size:15px;margin-top:0;}
.playcard.big{flex:0 0 auto;position:relative;}
.playcard.big.bust{box-shadow:0 0 0 2px var(--red),0 12px 28px -10px rgba(255,67,101,.7);}
.hc-mark{position:absolute;top:-7px;right:-6px;width:20px;height:20px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:700;border:2px solid #0F1422;color:#fff;z-index:2;}
.hc-mark.up{background:#16a35a;}
.hc-mark.down{background:#d62244;}
.hc-mark.skip{background:#5c6680;font-size:10px;}
.playcard.big .hc-mark.bust{top:-10px;right:-9px;width:24px;height:24px;font-size:14px;background:#d62244;}
.hilo-guess .hg-prob{font-size:10.5px;font-weight:600;opacity:.92;}

/* ---- stake gift rarity ---- */
.stake-gift .sg-rar{display:inline-block;font-size:8.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:1px 5px;border-radius:5px;color:#fff;vertical-align:middle;margin-left:4px;}

@media(prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important;}}
/* ===================== КЕЙСЫ ===================== */
.game-tile.gt-wide{grid-column:1 / -1;aspect-ratio:auto;height:104px;}
.gt-wide .gt-art{justify-content:center;}
.gt-wide .gt-art svg{width:auto;height:60%;}
.art-cases{background:radial-gradient(120% 150% at 50% 0%,rgba(255,210,59,.20),transparent 56%),linear-gradient(120deg,#2a2147,#11304c 68%,#0c1626);}
.gt-badge{font-family:'Space Grotesk';font-size:10px;font-weight:700;letter-spacing:.5px;color:#0e1626;background:linear-gradient(90deg,#FFE072,#FF9D00);padding:3px 8px;border-radius:7px;margin-left:9px;vertical-align:middle;text-shadow:none;}

.case-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:6px;}
.case-card{position:relative;overflow:hidden;border-radius:var(--radius);border:1px solid var(--line2);background:linear-gradient(180deg,var(--surface),var(--surface2));padding:14px 12px 13px;cursor:pointer;transition:transform .14s,border-color .14s;display:flex;flex-direction:column;align-items:center;}
.case-card:active{transform:scale(.97);}
.cc-glow{position:absolute;inset:0;pointer-events:none;}
.cc-art{position:relative;width:96px;height:74px;}
.cc-art svg{width:100%;height:100%;}
.cc-name{position:relative;font-family:'Space Grotesk';font-weight:700;font-size:15px;margin-top:6px;color:#fff;}
.cc-price{position:relative;display:flex;align-items:center;gap:5px;font-family:'Space Grotesk';font-size:14px;color:var(--ton-lite);margin-top:3px;}
.cc-price b{color:#fff;font-weight:700;}
.case-foot{color:var(--muted);font-size:12px;line-height:1.5;margin:16px 2px 4px;}

.case-reel-wrap{position:relative;margin:10px 0 14px;}
.case-reel-vp{position:relative;height:var(--vph,120px);overflow:hidden;border-radius:14px;border:1px solid var(--line2);background:linear-gradient(180deg,#0d1320,#11192a);box-shadow:inset 0 0 30px rgba(0,0,0,.6);}
.case-reel-vp::before,.case-reel-vp::after{content:'';position:absolute;top:0;bottom:0;width:54px;z-index:2;pointer-events:none;}
.case-reel-vp::before{left:0;background:linear-gradient(90deg,#0d1320,transparent);}
.case-reel-vp::after{right:0;background:linear-gradient(270deg,#0d1320,transparent);}
.case-reel-strip{display:flex;align-items:center;height:100%;will-change:transform;}
.case-marker{position:absolute;left:50%;top:-3px;bottom:-3px;width:3px;transform:translateX(-50%);background:linear-gradient(180deg,#FFD23B,#FF9D00);border-radius:2px;z-index:4;box-shadow:0 0 12px rgba(255,210,59,.85);}
.case-marker::before,.case-marker::after{content:'';position:absolute;left:50%;transform:translateX(-50%);border-left:7px solid transparent;border-right:7px solid transparent;}
.case-marker::before{top:-1px;border-top:9px solid #FFD23B;}
.case-marker::after{bottom:-1px;border-bottom:9px solid #FFD23B;}

.case-tile{position:relative;box-sizing:border-box;flex:0 0 auto;width:var(--tw,84px);height:var(--th,104px);margin:0 4px;border-radius:11px;border:1px solid var(--line2);background:var(--surface);overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.case-reels.compact .case-reel-wrap{margin:5px 0;}
.case-reels.compact .ct-name{font-size:8px;padding:0 3px 4px;}
.case-reels.compact .case-tile{border-radius:9px;}
.ct-bar{position:absolute;top:0;left:0;right:0;height:4px;}
.ct-mid{display:flex;align-items:center;justify-content:center;flex:1;width:100%;margin-top:4px;}
.ct-name{font-size:9px;font-weight:600;color:var(--muted);text-align:center;padding:0 4px 7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
.ct-q{font-family:'Space Grotesk';font-size:34px;font-weight:800;color:#FFD23B;text-shadow:0 0 14px rgba(255,210,59,.7);}
.case-tile.jack-myst{border-color:var(--jc);background:radial-gradient(circle at 50% 40%,color-mix(in srgb,var(--jc) 24%,transparent),transparent 78%);box-shadow:inset 0 0 18px color-mix(in srgb,var(--jc) 30%,transparent);}
.case-tile.jack-myst .ct-q{color:var(--jc);text-shadow:0 0 14px var(--jc);}
.case-tile.empty-tile{border-color:#4a5264;background:repeating-linear-gradient(45deg,rgba(255,255,255,.025) 0 6px,transparent 6px 12px);}

.case-result{min-height:6px;margin-bottom:12px;}
.case-won{display:flex;flex-direction:column;align-items:center;gap:4px;padding:16px;border-radius:16px;border:1px solid var(--line2);background:var(--surface);animation:wonPop .3s ease;}
@keyframes wonPop{from{transform:scale(.92);opacity:0;}to{transform:scale(1);opacity:1;}}
.case-won.win{border-color:rgba(46,213,115,.5);background:linear-gradient(180deg,rgba(46,213,115,.10),var(--surface));}
.cw-mid{margin-bottom:2px;}
.cw-name{font-family:'Space Grotesk';font-weight:700;font-size:18px;color:#fff;}
.cw-sub{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px;}
.cw-sub2{font-family:'Space Grotesk';font-weight:700;font-size:14px;color:#fff;margin-top:2px;}
.case-won.win .cw-sub2{color:var(--green);}
.case-won.lose .cw-sub2{color:var(--muted2);}

/* джекпот: запечатанная капсула + ручная распаковка, фон статичный */
.jack-prompt,.jack-reveal{position:relative;display:flex;flex-direction:column;align-items:center;gap:6px;padding:20px 16px;border-radius:16px;border:1px solid var(--jc);background:radial-gradient(circle at 50% 38%,color-mix(in srgb,var(--jc) 15%,var(--surface)),var(--surface));overflow:hidden;animation:wonPop .3s ease;}
.jp-rays{position:absolute;top:50%;left:50%;width:340px;height:340px;transform:translate(-50%,-50%);background:repeating-conic-gradient(from 0deg,color-mix(in srgb,var(--jc) 17%,transparent) 0deg 9deg,transparent 9deg 22deg);pointer-events:none;opacity:.55;-webkit-mask:radial-gradient(circle,#000 0,transparent 70%);mask:radial-gradient(circle,#000 0,transparent 70%);}
.jp-core{position:relative;width:84px;height:84px;border-radius:18px;border:2px solid var(--jc);display:grid;place-items:center;background:radial-gradient(circle,color-mix(in srgb,var(--jc) 22%,transparent),transparent);box-shadow:0 0 26px -4px var(--jc);animation:jackFloat 1.9s ease-in-out infinite;}
.jp-q{font-family:'Space Grotesk';font-size:46px;font-weight:800;color:var(--jc);text-shadow:0 0 22px var(--jc);}
@keyframes jackFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
.jp-label{position:relative;font-family:'Space Grotesk';font-weight:800;font-size:13px;letter-spacing:1.4px;color:var(--jc);}
.jp-btn{position:relative;margin-top:8px;background:var(--jc);color:#0c1018;font-weight:800;border:none;min-width:172px;box-shadow:0 6px 20px -6px var(--jc);}

/* скролл-контейнер шансов в шторке */

/* чит-код в профиле */
.cheat-card{margin-top:14px;border-radius:var(--radius);border:1px solid var(--line2);background:linear-gradient(180deg,var(--surface),var(--surface2));padding:14px;}
.cheat-card.on{border-color:rgba(255,176,32,.55);background:linear-gradient(180deg,rgba(255,176,32,.10),var(--surface));box-shadow:inset 0 0 34px -16px var(--gold);}

.cheat-t{font-family:'Space Grotesk';font-weight:700;font-size:15px;color:#fff;}

.cheat-row{display:flex;gap:8px;margin-top:12px;}
.cheat-input{flex:1;min-width:0;background:var(--bg2);border:1px solid var(--line2);border-radius:12px;padding:11px 13px;color:#fff;font-size:14px;font-family:'Space Grotesk';font-weight:600;letter-spacing:.5px;outline:none;transition:border-color .14s;}

.cheat-go{flex:0 0 auto;width:auto;min-width:0;padding-left:18px;padding-right:18px;}
.cheat-off{margin-top:12px;color:var(--gold);border-color:rgba(255,176,32,.4);}
/* мультиоткрытие: счётчик количества */
.case-count{display:flex;gap:6px;margin:2px 0 10px;}
.cnt-btn{flex:1;padding:8px 0;border-radius:10px;border:1px solid var(--line2);background:var(--surface);color:var(--muted);font-family:'Space Grotesk';font-weight:700;font-size:13px;cursor:pointer;transition:transform .1s,border-color .12s,color .12s,background .12s;}
.cnt-btn.on{border-color:var(--ton);color:#fff;background:linear-gradient(180deg,rgba(42,171,238,.18),var(--surface));box-shadow:inset 0 0 18px -8px var(--ton);}
.cnt-btn:active{transform:scale(.95);}

.case-reels{display:flex;flex-direction:column;}
/* панель управления: ⚡ / открыть / авто */
.case-ctrls{display:flex;align-items:stretch;gap:9px;margin-bottom:6px;}
.case-ctrls .case-open-btn{flex:1;margin:0;}
.case-tgl{flex:0 0 auto;width:50px;border-radius:14px;border:1px solid var(--line2);background:var(--surface);font-size:20px;cursor:pointer;display:grid;place-items:center;transition:transform .1s,border-color .12s,background .12s,box-shadow .12s;}

.case-tgl.on{border-color:var(--gold);background:linear-gradient(180deg,rgba(255,176,32,.18),var(--surface));box-shadow:inset 0 0 20px -8px var(--gold),0 0 0 1px rgba(255,176,32,.25);}
#autoBtn.on{border-color:var(--green);background:linear-gradient(180deg,rgba(46,213,115,.18),var(--surface));box-shadow:inset 0 0 20px -8px var(--green),0 0 0 1px rgba(46,213,115,.25);}
/* сетка результатов мультиоткрытия */
.mr-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(62px,1fr));gap:8px;margin-bottom:10px;}
.mr-card{position:relative;display:flex;flex-direction:column;align-items:center;gap:3px;padding:11px 6px 10px;border-radius:13px;border:1px solid var(--line2);background:var(--surface);overflow:hidden;animation:wonPop .3s ease;}
.mr-card.win{border-color:rgba(46,213,115,.45);background:linear-gradient(180deg,rgba(46,213,115,.09),var(--surface));}

.mr-ic{display:grid;place-items:center;height:34px;}
.mr-n{font-size:10px;font-weight:600;color:var(--text);text-align:center;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mr-v{display:flex;align-items:center;gap:3px;font-family:'Space Grotesk';font-weight:700;font-size:11px;}
.mr-tag{margin-top:1px;font-family:'Space Grotesk';font-size:7.5px;font-weight:800;letter-spacing:.6px;color:var(--tc);border:1px solid var(--tc);border-radius:5px;padding:1px 5px;}
.mr-sum{text-align:center;font-size:12.5px;color:var(--muted);}
.mr-sum b{font-family:'Space Grotesk';color:#fff;}
/* ===== ВВОД НИКА (первый вход) ===== */
.nick-gate{display:none;position:fixed;inset:0;z-index:200;background:radial-gradient(120% 90% at 50% 0%,#16223b,var(--bg) 70%);align-items:center;justify-content:center;padding:24px;}
.nick-gate.show{display:flex;animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.ng-card{width:100%;max-width:340px;display:flex;flex-direction:column;align-items:center;text-align:center;}
.ng-logo{margin-bottom:12px;}
.ng-title{font-family:'Space Grotesk';font-weight:800;font-size:28px;letter-spacing:.5px;}
.ng-title b{color:var(--ton);}
.ng-sub{color:var(--muted);font-size:14px;margin:6px 0 18px;}
.ng-input{width:100%;background:var(--bg2);border:1px solid var(--line2);border-radius:14px;padding:14px 16px;color:#fff;font-size:17px;font-family:'Space Grotesk';font-weight:700;text-align:center;outline:none;transition:border-color .14s;}
.ng-input:focus{border-color:var(--ton);}
.ng-hint{font-size:12px;color:var(--muted2);margin:8px 0 16px;height:14px;}
.ng-hint.err{color:var(--red);}
.ng-card .btn{width:100%;}
.ng-foot{font-size:11.5px;color:var(--muted2);line-height:1.5;margin-top:16px;}
/* ===== БАЛАНС: текущее значение + замок ===== */
.bal-now{font-family:'Space Grotesk';font-weight:800;font-size:26px;display:flex;align-items:center;gap:7px;margin:2px 0 10px;}
.bal-lock{margin-top:4px;padding:12px 14px;border-radius:12px;border:1px dashed var(--line2);background:var(--bg2);color:var(--muted);font-size:13px;text-align:center;}
/* ===== ПРОФИЛЬ: ник + смена ===== */
.ph-tx{flex:1;min-width:0;}
.ph-edit{flex:0 0 auto;width:36px;height:36px;border-radius:10px;border:1px solid var(--line2);background:var(--surface);font-size:15px;cursor:pointer;display:grid;place-items:center;}
.ph-edit:active{transform:scale(.93);}
.cheat-st{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:10px;padding:9px 12px;border-radius:11px;background:rgba(255,176,32,.10);border:1px solid rgba(255,176,32,.3);font-size:12.5px;font-weight:600;color:#fff;}
.cheat-x{flex:0 0 auto;background:none;border:1px solid var(--line2);color:var(--muted);border-radius:8px;padding:4px 11px;font-size:11px;font-weight:700;cursor:pointer;}
.cheat-x:active{transform:scale(.93);}
/* ===== ЛИДЕРБОРД ===== */
.lb-me{margin:4px 0 14px;padding:14px;border-radius:var(--radius);border:1px solid var(--line2);background:linear-gradient(135deg,rgba(0,152,234,.14),var(--surface));}
.lbm-top{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.lbm-l{font-family:'Space Grotesk';font-weight:700;font-size:16px;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lbm-v{display:flex;align-items:center;gap:6px;font-family:'Space Grotesk';font-weight:800;font-size:18px;white-space:nowrap;}
.lbm-b{font-size:12px;color:var(--muted);margin-top:5px;}
.lb-sub2{font-size:11.5px;color:var(--muted2);margin:0 2px 10px;}
.lb-list{display:flex;flex-direction:column;gap:7px;}
.lb-loading{text-align:center;color:var(--muted);font-size:13px;padding:26px 10px;}
.lb-row{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:12px;border:1px solid var(--line2);background:var(--surface);}
.lb-row.me{border-color:var(--ton);background:linear-gradient(90deg,rgba(0,152,234,.12),var(--surface));}
.lb-pos{flex:0 0 auto;width:30px;text-align:center;font-size:19px;}
.lb-rk{font-family:'Space Grotesk';font-weight:700;font-size:14px;color:var(--muted);}
.lb-nick{flex:1;min-width:0;font-family:'Space Grotesk';font-weight:600;font-size:14.5px;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lb-you{font-size:10px;font-weight:800;color:var(--ton);background:rgba(0,152,234,.16);border-radius:6px;padding:1px 6px;margin-left:5px;}
.lb-score{flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;}
.lb-score b{font-family:'Space Grotesk';font-size:14px;display:flex;align-items:center;gap:4px;}
.lb-bd{font-size:10px;color:var(--muted2);margin-top:1px;}
.lb-note{margin-top:6px;padding:16px;border-radius:var(--radius);border:1px solid var(--line2);background:var(--surface);}
.lbn-t{font-family:'Space Grotesk';font-weight:700;font-size:15px;color:#fff;margin-bottom:6px;}
.lbn-s{font-size:12.5px;color:var(--muted);line-height:1.55;}
/* ===== PvP — колесо ===== */
.gt-pvp .gt-name{color:#fff}
.art-pvp{background:radial-gradient(120% 120% at 50% 20%,#2a1c08,#0f1422)}
.art-pvp svg{width:auto;height:74%}
.pvp-top{margin:14px auto 4px;display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--line);
  border-radius:999px;padding:9px 20px;font-weight:800;letter-spacing:.04em;font-size:14px;color:var(--text);text-transform:uppercase;
  position:relative;left:50%;transform:translateX(-50%)}
.pvp-top b{color:var(--ton-lite);margin:0 2px}
.pvp-wheel-wrap{position:relative;width:100%;max-width:330px;margin:6px auto 2px;aspect-ratio:1}
.pvp-pointer{position:absolute;top:-3px;left:50%;transform:translateX(-50%);z-index:4;width:0;height:0;
  border-left:15px solid transparent;border-right:15px solid transparent;border-top:22px solid #fff;
  filter:drop-shadow(0 2px 3px rgba(0,0,0,.5))}
.pvp-svg{width:100%;display:block}
#pvpRot{transform-box:view-box;transform-origin:150px 150px}
.pvp-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:3;
  width:46%;height:46%;border-radius:50%;background:#0d1320;border:1px solid rgba(255,255,255,.06);
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;box-shadow:inset 0 0 24px rgba(0,0,0,.6)}
.pvp-c-main{font-size:19px;font-weight:800;color:var(--text);line-height:1.1;padding:0 6px}
.pvp-c-main.play{color:var(--green);letter-spacing:.06em}
.pvp-c-sub{font-size:11px;color:var(--muted2);margin-top:3px;text-transform:uppercase;letter-spacing:.05em}
.pvp-c-cd{font-size:46px;font-weight:800;color:#fff;line-height:1}
.pvp-c-win{font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;font-weight:700}
.pvp-bets{display:flex;gap:10px;margin:16px 0 4px}
.pvp-bet{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;font-weight:700;font-size:14px;padding:14px 8px}
.pvp-bet.ton{background:linear-gradient(120deg,var(--ton),var(--ton-deep));color:#fff;border:none}
.pvp-bet.gift{background:var(--surface2);color:var(--text);border:1px solid var(--line2)}
.pvp-bet:disabled{opacity:.45;pointer-events:none}
.pvp-players{margin-top:10px;display:flex;flex-direction:column;gap:7px}
.pvp-prow{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:10px 12px}
.pvp-prow.me{border-color:var(--ton);background:linear-gradient(120deg,rgba(42,171,238,.12),var(--surface))}
.pvp-dot{width:11px;height:11px;border-radius:50%;flex:none}
.pvp-pn{flex:1;font-weight:600;font-size:13.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pvp-pn b{color:var(--ton-lite);font-size:11px;margin-left:3px}
.pvp-pv{display:inline-flex;align-items:center;gap:3px;font-weight:700;font-size:13px;color:var(--text);font-variant-numeric:tabular-nums}
.pvp-pc{min-width:48px;text-align:right;font-weight:800;font-size:13px;color:var(--gold);font-variant-numeric:tabular-nums}
.pvp-empty{color:var(--muted);font-size:13px;text-align:center;padding:16px 10px;background:var(--surface);border:1px dashed var(--line2);border-radius:var(--radius-sm);line-height:1.5}
.pvp-foot{color:var(--muted2);font-size:11.5px;line-height:1.5;margin:14px 2px 4px}
/* выбор подарков для ставки */
.pvp-gpick-wrap{display:flex;flex-direction:column;gap:7px;max-height:300px;overflow:auto;margin:4px 0}
.pvp-gpick{display:flex;align-items:center;gap:10px;width:100%;background:var(--surface2);border:1.5px solid var(--line);border-radius:11px;padding:8px 11px;text-align:left;cursor:pointer}
.pvp-gpick.on{border-color:var(--ton);background:linear-gradient(120deg,rgba(42,171,238,.16),var(--surface2))}
.pgk-n{flex:1;font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pgk-v{font-weight:700;font-size:13px;font-variant-numeric:tabular-nums}
.pvp-gpick-sum{margin-top:9px;font-size:13px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:4px}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="brand">
      <span class="logo" id="brandLogo"></span>
      <span class="name">TON<b>LUCK</b></span>
      <span class="tag">demo</span>
    </div>
    <button class="balance-pill" id="balancePill" aria-label="Баланс">
      <span id="balLogo"></span>
      <span class="bal-val num" id="balVal">0</span>
      <span class="chev">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
    </button>
  </div>

  <!-- SCREENS -->
  <div class="screen" id="screenGames"></div>
  <div class="screen hidden" id="screenInventory"></div>
  <div class="screen hidden" id="screenLeaderboard"></div>
  <div class="screen hidden" id="screenProfile"></div>

  <!-- TAB BAR -->
  <nav class="tabbar">
    <button class="tab active" data-tab="games">
      <svg width="23" height="23" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="2" stroke="currentColor" stroke-width="2"/><rect x="14" y="3" width="7" height="7" rx="2" stroke="currentColor" stroke-width="2"/><rect x="3" y="14" width="7" height="7" rx="2" stroke="currentColor" stroke-width="2"/><rect x="14" y="14" width="7" height="7" rx="2" stroke="currentColor" stroke-width="2"/></svg>
      Игры
    </button>
    <button class="tab" data-tab="inventory">
      <svg width="23" height="23" viewBox="0 0 24 24" fill="none"><path d="M20 12v8a1 1 0 01-1 1H5a1 1 0 01-1-1v-8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><rect x="2.5" y="7" width="19" height="5" rx="1" stroke="currentColor" stroke-width="2"/><path d="M12 7v14M12 7S9.5 3 7.5 3 5 5.5 7 7M12 7s2.5-4 4.5-4S19 5.5 17 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Инвентарь
    </button>
    <button class="tab" data-tab="leaderboard">
      <svg width="23" height="23" viewBox="0 0 24 24" fill="none"><path d="M8 21V10H4v11M20 21V14h-4v7M14 21V3h-4v18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Лидерборд
    </button>
    <button class="tab" data-tab="profile">
      <svg width="23" height="23" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/><path d="M4 21c0-4 3.5-6 8-6s8 2 8 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      Профиль
    </button>
  </nav>

  <!-- OVERLAY (sheets) -->
  <div class="overlay" id="overlay">
    <div class="sheet" id="sheet"></div>
  </div>

  <!-- NICK GATE (первый вход) -->
  <div class="nick-gate" id="nickGate">
    <div class="ng-card">
      <div class="ng-logo" id="ngLogo"></div>
      <div class="ng-title">TON<b>LUCK</b></div>
      <div class="ng-sub">Придумай ник для лидерборда</div>
      <input class="ng-input" id="ngInput" maxlength="16" placeholder="твой ник" autocomplete="off" autocapitalize="off" spellcheck="false">
      <div class="ng-hint" id="ngHint">2–16 символов</div>
      <button class="btn btn-primary" id="ngGo">Играть</button>
      <div class="ng-foot">Стартовый баланс — 1000 TON. Это демо: баланс нельзя пополнить или вывести.</div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>
</div>

<script>
/* =====================================================================
   КОНФИГ — здесь меняй всё важное
   ===================================================================== */
const CONFIG = {
  // Преимущество казино. 0.04 = RTP 96%. Подними, чтобы казино
  // выигрывало заметнее/быстрее в демонстрации.
  HOUSE_EDGE: 0.04,

  // Стартовый демо-баланс.
  START_BALANCE: 1000,

function fmtTon(n){

function giftSlug(g){ return g.name.toLowerCase().replace(/[^a-z0-9]/g,''); }
function giftImgUrl(g){ return 'https://fragment.com/file/gifts/'+giftSlug(g)+'/thumb.webp'; }

let toastT;

/* выдать выигрыш: TON или подарок. Возвращает описание для модалки. */
let diceTargetKey = null;   // целевой подарок-приз ТОЛЬКО для Dice (null = авто: лучший по сумме)
function diceTarget(){ return diceTargetKey ? GIFT_MAP[diceTargetKey] : null; }

function awardWin(payout, prizeOverride){
  state.stats.wins++;
  const g = (prizeOverride !== undefined) ? prizeOverride : prizeForPayout(payout);
  if(!g){
    state.balance += payout;
    state.stats.returned += payout;
    if(payout > state.stats.biggest) state.stats.biggest = payout;
    save();
    return { kind:'ton', amount:payout };
  }
  const change = Math.round((payout - g.price) * 100) / 100; // сдача: остаток от риска
  state.inventory.push({ id:uid(), key:g.key });
  if(change > 0) state.balance += change;
  state.stats.returned += payout; // подарок (floor) + сдача = полная сумма выигрыша
  if(payout > state.stats.biggest) state.stats.biggest = payout;
  save();
  return { kind:'gift', gift:g, change:change };
}

/* авто-приз: самый дорогой подарок <= payout; null если payout < самого дешёвого */
function prizeForPayout(payout){
  if(!(payout >= CHEAPEST)) return null;
  let best = GIFTS[0];
  for(const g of GIFTS){ if(g.price <= payout) best = g; else break; }
  return best;
}
/* приз для Dice с учётом выбранного целевого подарка (на шансы/RTP не влияет:
   полная стоимость выдачи всегда = payout) */
function dicePrize(payout){
  if(!(payout >= CHEAPEST)) return null;
  if(diceTargetKey){ const tg = GIFT_MAP[diceTargetKey]; if(tg && payout >= tg.price) return tg; }
  return prizeForPayout(payout);
}

/* ===== СТАВКА: TON или подарок (общее для всех игр) ===== */
let betMode = 'ton';      // 'ton' | 'gift'
let betTon = 10;          // числовая ставка в TON (общая для всех игр)
let betGiftId = null;     // id предмета из инвентаря (ставка подарком)
function selectedBetGift(){ return betGiftId ? state.inventory.find(x=>x.id===betGiftId) : null; }
/* TON-эквивалент текущей ставки (для множителей/призов) */
function effectiveBet(){
  if(betMode==='gift'){ const it=selectedBetGift(); return it ? GIFT_MAP[it.key].price : 0; }
  return Math.round((betTon||0)*100)/100;
}
/* подпись ставки для кнопок */
function stakeLabel(){
  if(betMode==='gift'){ const it=selectedBetGift(); return it ? GIFT_MAP[it.key].name : 'подарок'; }
  return fmtTon(effectiveBet())+' TON';
}
/* списать ставку. {ok, value}. В режиме подарка — удаляет подарок из инвентаря. */
function consumeStake(){
  if(betMode==='gift'){
    const it = selectedBetGift();
    if(!it){ toast('Выберите подарок для ставки'); return {ok:false}; }
    const g = GIFT_MAP[it.key];
    const idx = state.inventory.findIndex(x=>x.id===it.id);
    if(idx<0){ betGiftId=null; toast('Подарок уже не в инвентаре'); return {ok:false}; }
    state.inventory.splice(idx,1);
    betGiftId = null;
    state.stats.wagered += g.price; state.stats.plays++;
    save();
    return {ok:true, value:g.price};
  }
  const bet = Math.round((betTon||0)*100)/100;
  if(!(bet>=CONFIG.MIN_BET)){ toast('Минимальная ставка '+CONFIG.MIN_BET); return {ok:false}; }
  if(bet>state.balance){ toast('Ставка больше баланса'); return {ok:false}; }
  state.balance -= bet;
  state.stats.wagered += bet; state.stats.plays++;
  save();
  return {ok:true, value:bet};
}

/* =====================================================================
   МАТЕМАТИКА ИГР  (преимущество казино в множителе)
   ===================================================================== */
/* минимальный множитель во всех режимах = 1.00× (если математика даёт <1, ставим 1) */
function mClamp(m){ return m < 1 ? 1 : m; }
function minesMult(revealed, mines){
  if(revealed<=0) return 1;
  let m = 1;
  for(let i=0;i<revealed;i++){ m *= (25 - i) / (25 - mines - i); }
  return mClamp((1 - CONFIG.HOUSE_EDGE) * m);
}
function towerMult(level, diff){
  const step = diff.cols / (diff.cols - diff.bombs);
  return mClamp((1 - CONFIG.HOUSE_EDGE) * Math.pow(step, level));
}
/* Dice: множитель стороны = 1/доля; шанс = доля*(1-edge); EV = 1-edge = RTP. */
function diceMult(share){ return mClamp(1 / share); }
function diceChance(share){ return share * (1 - CONFIG.HOUSE_EDGE); }

  }
  html += '</div>';
  return html;
}
function syncStartBtn(){
  const b = document.querySelector('.js-start-btn');
  if(b) b.textContent = (b.dataset.prefix||'') + stakeLabel();
}
function wireBetPanel(redraw, onLive){
  const live = ()=>{ syncStartBtn(); if(onLive) onLive(); };
  document.querySelectorAll('#betPanel .bet-mode').forEach(b=> b.addEventListener('click', ()=>{
    if(betMode!==b.dataset.mode){ betMode=b.dataset.mode; redraw(); }
  }));
  const input = document.getElementById('betInput');
  if(input){
    input.addEventListener('input', ()=>{ betTon = parseFloat(String(input.value).replace(',','.'))||0; live(); });
    document.querySelectorAll('#betPanel .mini-btn').forEach(b=> b.addEventListener('click', ()=>{
      let v = betTon;
      if(b.dataset.bet==='half') v=v/2;
      if(b.dataset.bet==='double') v=v*2;
      if(b.dataset.bet==='max') v=state.balance;
      v=Math.max(CONFIG.MIN_BET, Math.round(v*100)/100);
      betTon=v; input.value=v; live();
    }));
    document.querySelectorAll('#betPanel .chip').forEach(c=> c.addEventListener('click', ()=>{ betTon=parseFloat(c.dataset.betset); input.value=betTon; live(); }));
  }
  const gb = document.getElementById('stakeGiftBtn');
  if(gb) gb.addEventListener('click', ()=>{ if(state.inventory.length) openStakeGiftPicker(redraw); else toast('Нет подарков для ставки'); });
}

/* превью приза за выигрыш payout (подарок или TON) */
function prizeChip(payout, label){

function prizeRow(curPayout, nextPayout, curLabel, nextLabel){

let mines = null;
function openMines(){
  mines = { bet:10, count:3, active:false, over:false, mineSet:new Set(), revealed:new Set(), lastRevealed:-1 };
  drawMines();
}
function drawMines(){
  const k = mines.revealed.size;
  const bet = mines.active ? mines.bet : effectiveBet();
  const curMult = minesMult(k, mines.count);
  const payout = bet * curMult;
  const nextMult = minesMult(k+1, mines.count);
  const nextPayout = bet * nextMult;
  const cashPrize = (mines.active && !mines.over && k>=1) ? prizeForPayout(payout) : null;

  let html = gameHeadHTML('Мины', 'Поле 5×5 · '+mines.count+' мин');

  if(!mines.active){
    html += betPanelHTML();
    html += '<div class="panel">'
      +'<div class="field-label"><span>Количество мин</span><span>больше мин — выше множитель</span></div>'
      +'<div class="mines-count">'
        +'<button class="mc-btn" id="minesDown">−</button>'
        +'<div class="mc-val"><div class="v num" id="minesCountV">'+mines.count+'</div><div class="l">МИН ИЗ 25</div></div>'
        +'<button class="mc-btn" id="minesUp">+</button>'
      +'</div>'
    +'</div>';
    const p1=bet*minesMult(1,mines.count), p2=bet*minesMult(2,mines.count);
    html += '<div id="minesBetPrize">'+prizeRow(bet>0?p1:null, bet>0?p2:null, 'Приз за 1 шаг', 'За 2 шага')+'</div>';
  } else {
    html += '<div class="live-bar">'
      +'<div class="live-cell mult"><div class="lc-l">Множитель</div><div class="lc-v num">'+curMult.toFixed(2)+'×</div></div>'
      +'<div class="live-cell"><div class="lc-l">Забрать</div><div class="lc-v num">'+ tonInline(16) +' '+fmtTon(payout)+'</div></div>'
    +'</div>';
    const curPP = k>=1 ? payout : null;
    const nextPP = (k+1)<=(25-mines.count) ? nextPayout : null;
    html += prizeRow(curPP, nextPP, 'Сейчас', 'Следующий');
  }

  // поле
  html += '<div class="board" id="board">';
  for(let i=0;i<25;i++){
    let cls='tile';
    let content='';
    if(mines.revealed.has(i)){
      if(mines.mineSet.has(i)){ cls+=' revealed mine'+(mines.over?' hit':''); content='💣'; }
      else {
        cls+=' revealed gem'+(i===mines.lastRevealed?' reveal-anim':'')+(mines.over?'':' cashed');
        if(i===mines.lastRevealed && mines.active && !mines.over && k>=1){
          content = cashPrize ? giftImg(cashPrize,30,8) : '<span class="cell-ton">'+tonInline(24)+'</span>';
        } else { content='💎'; }
      }
    } else if(mines.over){
      cls+=' disabled';
      if(mines.mineSet.has(i)){ cls+=' mine faded'; content='💣'; }
      else { cls+=' faded'; }
    } else if(!mines.active){
      cls+=' disabled';
    }
    html += '<div class="'+cls+'" data-i="'+i+'">'+content+'</div>';
  }
  html += '</div>';

  // действия
  if(!mines.active){
    html += '<button class="btn btn-primary js-start-btn" id="minesStart" data-prefix="Поставить ">Поставить '+stakeLabel()+'</button>';
  } else if(!mines.over){
    const disabled = k===0 ? 'disabled' : '';
    html += '<button class="btn btn-cashout" id="minesCash" '+disabled+'>'
      + (k===0 ? 'Откройте хотя бы одну клетку' : 'Забрать '+fmtTon(payout)+' TON · '+curMult.toFixed(2)+'×')
      +'</button>';
  } else {
    html += '<button class="btn btn-primary" id="minesAgain">Играть снова</button>';
  }

  gamesScreen.innerHTML = html;
  document.getElementById('gameBack').addEventListener('click', renderGamesHome);

  if(!mines.active){
    wireBetPanel(drawMines, ()=>{ const el=document.getElementById('minesBetPrize'); if(!el) return; const b=effectiveBet(); el.innerHTML=prizeRow(b>0?b*minesMult(1,mines.count):null, b>0?b*minesMult(2,mines.count):null, 'Приз за 1 шаг', 'За 2 шага'); });
    document.getElementById('minesUp').addEventListener('click', ()=>{ if(mines.count<24){ mines.count++; drawMines(); } });
    document.getElementById('minesDown').addEventListener('click', ()=>{ if(mines.count>1){ mines.count--; drawMines(); } });
    document.getElementById('minesStart').addEventListener('click', startMines);
  } else if(!mines.over){
    document.getElementById('board').querySelectorAll('.tile').forEach(t=>{
      if(!mines.revealed.has(+t.dataset.i)) t.addEventListener('click', ()=>revealMine(+t.dataset.i));
    });
    const cash = document.getElementById('minesCash');
    if(k>0) cash.addEventListener('click', cashMines);
  } else {
    document.getElementById('minesAgain').addEventListener('click', openMines);
  }
}
function startMines(){
  const r = consumeStake(); if(!r.ok) return;
  mines.bet = r.value;
  renderBalance();
  // случайная расстановка мин
  const idx = [...Array(25).keys()];
  for(let i=idx.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [idx[i],idx[j]]=[idx[j],idx[i]]; }
  mines.mineSet = new Set(idx.slice(0, mines.count));
  mines.revealed = new Set();
  mines.lastRevealed = -1;
  mines.active = true; mines.over = false;
  drawMines();
}
function revealMine(i){
  if(mines.over || mines.revealed.has(i)) return;
  mines.revealed.add(i);
  mines.lastRevealed = i;
  if(mines.mineSet.has(i)){
    mines.over = true; mines.active = false;
    drawMines();
    setTimeout(()=>toast('💥 Мина! Ставка сгорела'), 120);
  } else {
    drawMines();
    // авто-выигрыш, если открыты все безопасные
    if(mines.revealed.size === 25 - mines.count){ finishMines(); }
  }
}
function cashMines(){ finishMines(); }
function finishMines(){
  const mult = minesMult(mines.revealed.size, mines.count);
  const payout = mines.bet * mult;
  mines.over = true; mines.active = false;
  const res = awardWin(payout);
  renderBalance();
  drawMines();
  showWinSheet(res, payout, openMines);
}

   ИГРА: TOWER
   ===================================================================== */
let tower = null;
function openTower(){
  tower = { bet:10, diffKey:'medium', active:false, over:false, level:0, bombs:[], chosen:[], lostRow:-1, lastPick:null };
  drawTower();
}
function drawTower(){
  const diff = DIFFS[tower.diffKey];
  const bet = tower.active ? tower.bet : effectiveBet();
  const curMult = towerMult(tower.level, diff);
  const payout = bet * curMult;
  const nextMult = towerMult(tower.level+1, diff);
  const nextPayout = bet * nextMult;
  const cashPrize = (tower.active && !tower.over && tower.level>=1) ? prizeForPayout(payout) : null;

  let html = gameHeadHTML('Tower', diff.label+' · '+diff.cols+' '+cellsWord(diff.cols)+' · '+diff.bombs+' мина');

  if(!tower.active){
    html += betPanelHTML();
    html += '<div class="panel">'
      +'<div class="field-label"><span>Сложность</span><span>сложнее — выше множитель</span></div>'
      +'<div class="diff-row" id="diffRow">';
    for(const key in DIFFS){
      const d=DIFFS[key];
      html += '<button class="diff-btn'+(key===tower.diffKey?' active':'')+'" data-diff="'+key+'">'+d.label+'<span class="db-sub">'+d.cols+' '+cellsWord(d.cols)+'</span></button>';
    }
    html += '</div></div>';
    const p1=bet*towerMult(1,diff), p2=bet*towerMult(2,diff);
    html += '<div id="towerBetPrize">'+prizeRow(bet>0?p1:null, bet>0?p2:null, 'Приз за 1 этаж', 'За 2 этажа')+'</div>';
  } else {
    html += '<div class="live-bar">'
      +'<div class="live-cell mult"><div class="lc-l">Множитель</div><div class="lc-v num">'+curMult.toFixed(2)+'×</div></div>'
      +'<div class="live-cell"><div class="lc-l">Забрать</div><div class="lc-v num">'+ tonInline(16) +' '+fmtTon(payout)+'</div></div>'
    +'</div>';
    const curPP = tower.level>=1 ? payout : null;
    const nextPP = (tower.level+1)<=TOWER_ROWS ? nextPayout : null;
    html += prizeRow(curPP, nextPP, 'Сейчас', 'Следующий');
  }

  // башня: рисуем сверху (высокий ряд) вниз (старт)
  html += '<div class="tower" id="tower">';
  for(let r=TOWER_ROWS-1;r>=0;r--){
    const isActive = tower.active && !tower.over && r===tower.level;
    const isCleared = r < tower.level;
    const rowMult = towerMult(r+1, diff);
    let rowCls='trow';
    if(tower.over){
      rowCls += (isCleared || r===tower.lostRow) ? ' revealed-bright' : ' revealed-dim';
    } else if(isActive){ rowCls+=' active'; }
    else { rowCls+=' locked'; }
    html += '<div class="'+rowCls+'"><div class="tmult num">'+rowMult.toFixed(2)+'×</div><div class="tcells">';
    for(let c=0;c<diff.cols;c++){
      let cls='tcell'; let content='';
      const bomb = tower.bombs[r] && tower.bombs[r].has(c);
      const justPicked = tower.lastPick && tower.lastPick.r===r && tower.lastPick.c===c;
      if(tower.over){
        // показываем ВСЕ мины и алмазы на всех этажах
        const reached = (isCleared || r===tower.lostRow);
        const clicked = (tower.chosen[r]===c);
        if(bomb){
          cls += (r===tower.lostRow && clicked) ? ' mine hit' : ' mine';
          content='💣';
        } else {
          cls += ' gem';
          if(isCleared && clicked) cls+=' path';
          content='💎';
        }
        // куда не нажимали — тусклее (на пройденных этажах нажатое остаётся ярким)
        if(reached && !clicked) cls+=' dim-cell';
      } else if(isCleared){
        if(tower.chosen[r]===c){
          if(justPicked && tower.active && !tower.over && tower.level>=1){
            content = cashPrize ? giftImg(cashPrize,26,7) : '<span class="cell-ton">'+tonInline(20)+'</span>';
          } else { content='💎'; }
          cls+=' gem'+(justPicked?' pop':'');
        }
      }
      html += '<div class="'+cls+'" data-r="'+r+'" data-c="'+c+'">'+content+'</div>';
    }
    html += '</div></div>';
  }
  html += '</div>';

  if(!tower.active){
    html += '<button class="btn btn-primary js-start-btn" id="towerStart" data-prefix="Поставить ">Поставить '+stakeLabel()+'</button>';
  } else if(!tower.over){
    const disabled = tower.level===0 ? 'disabled' : '';
    html += '<button class="btn btn-cashout" id="towerCash" '+disabled+'>'
      + (tower.level===0 ? 'Поднимитесь на ряд выше' : 'Забрать '+fmtTon(payout)+' TON · '+curMult.toFixed(2)+'×')
      +'</button>';
  } else {
    html += '<button class="btn btn-primary" id="towerAgain">Играть снова</button>';
  }

  gamesScreen.innerHTML = html;
  document.getElementById('gameBack').addEventListener('click', renderGamesHome);

  if(!tower.active){
    wireBetPanel(drawTower, ()=>{ const el=document.getElementById('towerBetPrize'); if(!el) return; const b=effectiveBet(), d=DIFFS[tower.diffKey]; el.innerHTML=prizeRow(b>0?b*towerMult(1,d):null, b>0?b*towerMult(2,d):null, 'Приз за 1 этаж', 'За 2 этажа'); });
    document.querySelectorAll('#diffRow .diff-btn').forEach(b=> b.addEventListener('click', ()=>{ tower.diffKey=b.dataset.diff; drawTower(); }));
    document.getElementById('towerStart').addEventListener('click', startTower);
  } else if(!tower.over){
    document.querySelectorAll('#tower .trow.active .tcell').forEach(cell=>
      cell.addEventListener('click', ()=>pickTower(+cell.dataset.r, +cell.dataset.c))
    );
    const cash = document.getElementById('towerCash');
    if(tower.level>0) cash.addEventListener('click', cashTower);
  } else {
    document.getElementById('towerAgain').addEventListener('click', openTower);
  }
}
function startTower(){
  const r = consumeStake(); if(!r.ok) return;
  const diff = DIFFS[tower.diffKey];
  tower.bet = r.value; renderBalance();
  // бомбы по рядам
  tower.bombs = [];
  for(let row=0;row<TOWER_ROWS;row++){
    const cols=[...Array(diff.cols).keys()];
    for(let i=cols.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [cols[i],cols[j]]=[cols[j],cols[i]]; }
    tower.bombs.push(new Set(cols.slice(0,diff.bombs)));
  }
  tower.chosen = new Array(TOWER_ROWS).fill(-1);
  tower.level = 0; tower.active = true; tower.over = false; tower.lostRow=-1; tower.lastPick=null;
  drawTower();
}
function pickTower(r,c){
  if(tower.over || r!==tower.level) return;
  tower.chosen[r]=c;
  tower.lastPick={r:r,c:c};
  if(tower.bombs[r].has(c)){
    tower.over=true; tower.active=false; tower.lostRow=r;
    drawTower();
    setTimeout(()=>toast('💥 Бомба! Ставка сгорела'),120);
  } else {
    tower.level++;
    if(tower.level>=TOWER_ROWS){ finishTower(); }
    else drawTower();
  }
}
function cashTower(){ finishTower(); }
function finishTower(){
  const diff = DIFFS[tower.diffKey];
  const mult = towerMult(tower.level, diff);
  const payout = tower.bet * mult;
  tower.over=true; tower.active=false;
  const res = awardWin(payout);
  renderBalance();
  drawTower();
  showWinSheet(res, payout, openTower);
}

/* =====================================================================
   ИГРА: DICE  (кольцо blue/purple + слайдер шанса)
   ===================================================================== */
let dice = null;
function openDice(){
  dice = { slider:50, rolling:false, auto:false, angle:0, lastSide:null, lastResult:null };
  drawDice();
}
function diceGeom(){
  const v = dice.slider;                 // позиция границы 5..95 (слева фиолет, справа синий)
  const frac = (v-5)/90;                 // доля ширины слева от ползунка
  const purpleShare = Math.min(0.97, Math.max(0.03, frac));      // фиолетовый = слева
  const blueShare = 1 - purpleShare;                              // синий = справа
  return {
    v, frac, blueShare, purpleShare,
    blueMult: diceMult(blueShare),  purpleMult: diceMult(purpleShare),
    blueChance: diceChance(blueShare), purpleChance: diceChance(purpleShare),
    edge: CONFIG.HOUSE_EDGE
  };
}
function diceSliderBg(frac){ const p=(frac*100).toFixed(1); return 'linear-gradient(90deg,#9B5DE5 0 '+p+'%,#2AABEE '+p+'% 100%)'; }
function diceArcs(g){ return { blueEnd:g.blueChance, houseEnd:g.blueChance+g.edge }; }
function dicePolar(cx,cy,r,deg){ const a=(deg-90)*Math.PI/180; return [cx+r*Math.cos(a), cy+r*Math.sin(a)]; }
function diceArcD(cx,cy,r,startDeg,endDeg){
  if(endDeg-startDeg >= 359.999) endDeg = startDeg+359.999;
  const [x1,y1]=dicePolar(cx,cy,r,startDeg), [x2,y2]=dicePolar(cx,cy,r,endDeg);
  const large = (endDeg-startDeg)>180 ? 1 : 0;
  return 'M '+x1.toFixed(2)+' '+y1.toFixed(2)+' A '+r+' '+r+' 0 '+large+' 1 '+x2.toFixed(2)+' '+y2.toFixed(2);
}
const DICE_R=104, DICE_C=120;
function drawDice(){
  const g = diceGeom();
  const bet = effectiveBet();
  const a = diceArcs(g);
  const blueD = diceArcD(DICE_C,DICE_C,DICE_R, 0, a.blueEnd*360);
  const houseD = diceArcD(DICE_C,DICE_C,DICE_R, a.blueEnd*360, a.houseEnd*360);
  const purpleD = diceArcD(DICE_C,DICE_C,DICE_R, a.houseEnd*360, 360);
  const skullDeg = (a.blueEnd + g.edge/2)*360;

  let html = gameHeadHTML('Dice', 'Шанс синего '+(g.blueChance*100).toFixed(1)+'% · RTP '+((1-CONFIG.HOUSE_EDGE)*100).toFixed(0)+'%');

  html += '<div class="dice-stage">'
    +'<div class="dice-side-prize purple" id="sidePurple"></div>'
    +'<div class="dice-ring-wrap">'
      +'<svg class="dice-ring" viewBox="0 0 240 240">'
        +'<circle cx="120" cy="120" r="104" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="16"/>'
        +'<path id="arcPurple" d="'+purpleD+'" fill="none" stroke="#9B5DE5" stroke-width="16" stroke-linecap="round"/>'
        +'<path id="arcBlue" d="'+blueD+'" fill="none" stroke="#2AABEE" stroke-width="16" stroke-linecap="round"/>'
        +'<path id="arcHouse" d="'+houseD+'" fill="none" stroke="#FF4365" stroke-width="16"/>'
      +'</svg>'

    +'<button class="btn dice-bet purple" id="betPurple" '+dis+'><span class="db-mult num">'+g.purpleMult.toFixed(2)+'×</span><span class="db-cap">СТАВКА</span></button>'
  +'</div>';

/* стабильное обновление бокового приза: картинку пересоздаём только если подарок сменился */
function setSidePrize(boxId, mult, payout){
  const box=document.getElementById(boxId); if(!box) return;

function updateDiceVisual(){
  const g = diceGeom(); const a=diceArcs(g); const bet=effectiveBet();
  const setD=(id,s,e)=>{ const el=document.getElementById(id); if(el) el.setAttribute('d', diceArcD(DICE_C,DICE_C,DICE_R,s,e)); };
  setD('arcBlue', 0, a.blueEnd*360);
  setD('arcHouse', a.blueEnd*360, a.houseEnd*360);
  setD('arcPurple', a.houseEnd*360, 360);
